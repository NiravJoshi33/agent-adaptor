[project]
name = "payment-escrow"
version = "0.1.0"
description = "Solana escrow payment adapter for Agent Adapter (consumes external program via IDL)"
requires-python = ">=3.12,<3.14"
dependencies = [
    "agent-adapter-contracts",
]

[project.entry-points."agent_adapter.payments"]
escrow = "payment_escrow:EscrowAdapter"
solana_escrow = "payment_escrow:EscrowAdapter"

[tool.uv.sources]
agent-adapter-contracts = { workspace = true }
