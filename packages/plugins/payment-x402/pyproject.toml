[project]
name = "payment-x402"
version = "0.1.0"
description = "x402 HTTP-native payment adapter for Agent Adapter"
requires-python = ">=3.12,<3.14"
dependencies = [
    "agent-adapter-contracts",
    "httpx>=0.28",
    "solders>=0.26",
    "solana>=0.36",
]

[project.entry-points."agent_adapter.payments"]
x402 = "payment_x402:X402Adapter"

[tool.uv.sources]
agent-adapter-contracts = { workspace = true }
