[project]
name = "wallet-ows"
version = "0.1.0"
description = "Open Wallet Standard wallet plugin for Agent Adapter"
requires-python = ">=3.12,<3.14"
dependencies = [
    "agent-adapter-contracts",
    "open-wallet-standard>=1.2",
    "solana>=0.36",
]

[project.entry-points."agent_adapter.wallets"]
ows = "wallet_ows:OWSWalletPlugin"

[tool.uv.sources]
agent-adapter-contracts = { workspace = true }
