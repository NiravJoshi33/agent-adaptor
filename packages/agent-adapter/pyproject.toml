[project]
name = "agent-adapter"
version = "0.1.0"
description = "Agent Adapter Runtime — turns any API into an autonomous economic agent"
requires-python = ">=3.12,<3.14"
dependencies = [
    "agent-adapter-contracts",
    "aiosqlite>=0.20",
    "httpx>=0.28",
    "pyyaml>=6.0",
    "openai>=1.70",
    "fastapi>=0.115",
    "uvicorn>=0.34",
    "cryptography>=44.0",
]

[project.optional-dependencies]
bundled = [
    "wallet-solana-raw",
    "wallet-ows",
    "payment-free",
    "payment-x402",
    "payment-escrow",
    "payment-mpp-stripe",
    "webhook-notifier",
]

[project.scripts]
agent-adapter = "agent_adapter.cli:app"

[tool.uv.sources]
agent-adapter-contracts = { workspace = true }
wallet-solana-raw = { workspace = true }
wallet-ows = { workspace = true }
payment-free = { workspace = true }
payment-x402 = { workspace = true }
payment-escrow = { workspace = true }
payment-mpp-stripe = { workspace = true }
webhook-notifier = { workspace = true }
